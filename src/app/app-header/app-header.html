<header class="bg-white dark:bg-dark-mid flex">
  <section
    class="w-[16rem] shrink-0 border-r border-r-grey-light dark:border-r-dark-light px-[2rem] py-[1rem] flex items-center"
  >
    <img src="./images/logo-light.svg" alt="Kanban Logo" class="hidden dark:block" />
    <img src="./images/logo-dark.svg" alt="Kanban Logo" class="block dark:hidden" />
  </section>

  <section
    class="flex-1 px-[2rem] py-[1rem] flex items-center justify-between text-black dark:text-white border-b border-b-grey-light dark:border-b-dark-light"
  >
    <h2 class="text-[1.5rem] font-[500]">Platform Launch</h2>

    <section class="flex items-center gap-[2rem]">
      <button
        (click)="handleTaskFormOpen()"
        class="px-[1.3rem] py-[.7rem] rounded-full text-[.8rem] bg-primary text-white cursor-pointer"
      >
        + Add New Task
      </button>
      <img src="./images/icon-vertical-ellipsis.svg" alt="three dots menu" />
    </section>
  </section>

  @if (isClicked) {
    <section
      (click)="handleTaskFormClose()"
      class="fixed inset-0 z-10 bg-black/40 cursor-pointer"
    ></section>

    <!-- Modal -->
    <section
      class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] p-[2rem] bg-white dark:bg-dark-mid rounded-[.3rem] z-20 flex flex-col gap-[1rem]"
    >
      <h2 class="text-[1.2rem] font-[500]">Add New Task</h2>

      <form class="flex flex-col gap-[1rem]">
        <label for="" class="flex flex-col gap-[.5rem] text-[.8rem] text-grey font-[500]">
          Name

          <input
            type="text"
            placeholder="e.g. Web Design"
            class="w-full text-[1rem] border border-slate-200 pl-[.5rem] py-[.5rem] rounded-[.2rem] font-[400]"
          />
        </label>

        <label for="" class="flex flex-col gap-[.5rem] text-[.8rem] text-grey font-[500]">
          Description

          <textarea
            placeholder="e.g. It's always a good to take a break. this 15 minute break will recharge the batteries a little."
            class="w-full h-[7rem] text-[1rem] border border-slate-200 pl-[.5rem] py-[.5rem] rounded-[.2rem] font-[400]"
          ></textarea>
        </label>

        <label for="" class="flex flex-col gap-[.5rem] text-[.8rem] text-grey font-[500]">
          Subtasks

          <section class="flex items-center gap-[1rem]">
            <input
              type="text"
              placeholder="e.g. Todo"
              class="w-full text-[1rem] border border-slate-200 pl-[.5rem] py-[.5rem] rounded-[.2rem] font-[400]"
            />
            <img src="/images/icon-cross.svg" alt="delete column" class="cursor-pointer" />
          </section>
        </label>

        <button
          class="px-[1.3rem] py-[.7rem] rounded-full text-[.8rem] bg-grey-light text-primary font-[500] cursor-pointer"
        >
          + Add New Subtask
        </button>

        <label for="" class="flex flex-col gap-[.5rem] text-[.8rem] text-grey font-[500]">
          Status

          <select
            class="w-full text-[1rem] border border-slate-200 px-[.5rem] py-[.5rem] rounded-[.2rem] font-[400]"
          >
            <option value="todo">Todo</option>
          </select>
        </label>

        <button
          class="px-[1.3rem] py-[.7rem] rounded-full text-[.8rem] bg-primary text-white font-[500] cursor-pointer"
        >
          Create New Task
        </button>
      </form>
    </section>
  }
</header>
